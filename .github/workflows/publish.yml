name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate release tag matches package version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          release_version = release_tag[1:] if release_tag.startswith("v") else release_tag
          project_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]

          if release_version != project_version:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not match project version {project_version!r}"
              )

          print(f"Validated release tag {release_tag} == project version {project_version}")
          PY
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Install hatch
        run: pip install hatch

      - name: Build package
        run: hatch build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
